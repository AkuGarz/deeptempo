name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-cpu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Run tests (CPU only)
        run: pytest tests/ -v -m "not gpu" --cov=deeptempo --cov-report=term-missing

      # TODO: add GPU runner for gpu-marked tests
      # Currently we only test CPU path in CI. GPU tests are run manually.
